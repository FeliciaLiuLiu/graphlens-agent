  <rect x="1110" y="120" width="370" height="420" class="box" />
  <text x="1295" y="165" text-anchor="middle" class="label">Harness Pipeline</text>

  <rect x="1160" y="200" width="270" height="58" class="box" />
  <text x="1295" y="236" text-anchor="middle" class="small">Schema Validation</text>

  <rect x="1160" y="280" width="270" height="58" class="box" />
  <text x="1295" y="316" text-anchor="middle" class="small">Graph Feature Builder</text>

  <rect x="1160" y="360" width="270" height="58" class="box" />
