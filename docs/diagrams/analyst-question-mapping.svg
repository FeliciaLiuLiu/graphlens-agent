<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 15px Arial, sans-serif; fill: #334155; }
      .q { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 14; ry: 14; }
      .m { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 14; ry: 14; }
      .o { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 14; ry: 14; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <text x="60" y="60" class="title">Analyst Question Mapping</text>

  <rect x="70" y="140" width="520" height="78" class="q" />
