  <rect x="690" y="620" width="360" height="72" class="m" />
  <text x="870" y="663" text-anchor="middle" class="label">SAR Red Flag Skills</text>

  <rect x="690" y="770" width="360" height="72" class="m" />
  <text x="870" y="813" text-anchor="middle" class="label">Investigation Playbooks</text>

  <rect x="1150" y="380" width="330" height="220" class="o" />
  <text x="1315" y="435" text-anchor="middle" class="label">Final Narrative</text>
  <text x="1315" y="475" text-anchor="middle" class="small">JSON + PDF investigation support</text>
  <text x="1315" y="510" text-anchor="middle" class="small">No final SAR decision</text>

