<svg xmlns="http://www.w3.org/2000/svg" width="2240" height="1860" viewBox="0 0 2240 1860" role="img" aria-labelledby="title desc">
  <title id="title">afc-network-narrative project structure</title>
  <desc id="desc">Project structure diagram showing a simplified VLM Adapter section and detailed Skills and Harness sections.</desc>
  <style>
    .bg { fill: #f7f8fb; }
    .panel { fill: #ffffff; stroke: #d6d9e0; stroke-width: 2; }
    .panel-soft { fill: #fbfcfe; stroke: #d6d9e0; stroke-width: 2; }
    .model { fill: #eef4ff; stroke: #88a6db; stroke-width: 2; }
    .skills { fill: #f2fbf4; stroke: #7db58a; stroke-width: 2; }
    .harness { fill: #fff7ec; stroke: #d8a15b; stroke-width: 2; }
    .subbox-skills { fill: #f8fdf9; stroke: #a9cfb2; stroke-width: 1.5; }
    .subbox-harness { fill: #fffaf3; stroke: #e0bf8e; stroke-width: 1.5; }
    .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
    .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .section { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .path { font: 600 16px Menlo, Consolas, monospace; fill: #374151; }
    .label { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    .mono { font: 14px Menlo, Consolas, monospace; fill: #334155; }
    .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .note { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
    .line { stroke: #cbd5e1; stroke-width: 2; }
  </style>

  <rect class="bg" x="0" y="0" width="2240" height="1860"/>

  <text x="70" y="70" class="title">afc-network-narrative Project Structure</text>
  <text x="70" y="104" class="subtitle">Detailed Skills and Harness layout. The model side is intentionally simplified to VLM Adapter only.</text>

  <rect class="panel" x="50" y="140" width="2140" height="1660" rx="24"/>
  <text x="80" y="188" class="path">afc-network-narrative/</text>
  <line class="line" x1="80" y1="205" x2="2160" y2="205"/>

  <!-- Model column -->
  <rect class="model" x="80" y="240" width="360" height="280" rx="20"/>
  <text x="110" y="286" class="section">Model</text>
  <text x="110" y="318" class="path">src/afc_network_narrative/model/</text>
  <rect class="panel" x="110" y="350" width="300" height="130" rx="16"/>
  <text x="140" y="395" class="label">VLM Adapter</text>
  <text x="140" y="425" class="mono">base.py / config.py / factory.py</text>
  <text x="140" y="450" class="mono">prompt_loader.py / json_utils.py</text>
  <text x="140" y="475" class="mono">pixtral.py</text>
  <text x="110" y="505" class="small">Only the stable extraction boundary is shown here.</text>

  <!-- Skills column -->
  <rect class="skills" x="470" y="240" width="760" height="1520" rx="20"/>
  <text x="500" y="286" class="section">Skills</text>
  <text x="500" y="318" class="path">skills/</text>
  <text x="500" y="346" class="small">SME-owned YAML, Markdown, and JSON schema contracts.</text>

  <rect class="subbox-skills" x="500" y="380" width="700" height="250" rx="16"/>
  <text x="525" y="416" class="label">graph_image_extraction/</text>
  <text x="525" y="442" class="mono">SKILL.md</text>
  <text x="525" y="465" class="mono">extraction_prompt.md</text>
  <text x="525" y="488" class="mono">graph_schema.json</text>
  <text x="525" y="511" class="mono">graph_image_extraction_contract.md</text>
  <text x="525" y="534" class="mono">graph_schema_contract.schema.json</text>
  <text x="525" y="566" class="body">Purpose: constrain visible-fact extraction only.</text>
  <text x="525" y="590" class="small">No AFC interpretation is allowed in this skill area.</text>

  <rect class="subbox-skills" x="500" y="655" width="700" height="355" rx="16"/>
  <text x="525" y="691" class="label">afc_typology_mapping/</text>
  <text x="525" y="717" class="mono">SKILL.md</text>
  <text x="525" y="740" class="mono">typology_rules.yaml / typology_rules.schema.json</text>
  <text x="525" y="763" class="mono">rule_engine_contract.md</text>
  <text x="525" y="786" class="mono">typology_glossary.yaml / typology_glossary.schema.json</text>
  <text x="525" y="809" class="mono">typology_glossary_contract.md</text>
  <text x="525" y="832" class="mono">source_registry.yaml / source_registry.schema.json</text>
  <text x="525" y="855" class="mono">source_registry_contract.md</text>
  <text x="525" y="887" class="body">Purpose: map graph features and motifs to AFC typology hypotheses.</text>
  <text x="525" y="911" class="small">Also stores glossary text, source ids, and rule-engine contracts.</text>

  <rect class="subbox-skills" x="500" y="1035" width="700" height="320" rx="16"/>
  <text x="525" y="1071" class="label">alert_investigation_boost/</text>
  <text x="525" y="1097" class="mono">SKILL.md</text>
  <text x="525" y="1120" class="mono">scoring_policy.yaml / scoring_policy.schema.json</text>
  <text x="525" y="1143" class="mono">scoring_policy_contract.md</text>
  <text x="525" y="1166" class="mono">sar_red_flags.yaml / sar_red_flags.schema.json</text>
  <text x="525" y="1189" class="mono">sar_red_flags_contract.md</text>
  <text x="525" y="1212" class="mono">investigation_playbooks.yaml / investigation_playbooks.schema.json</text>
  <text x="525" y="1235" class="mono">investigation_playbooks_contract.md</text>
  <text x="525" y="1267" class="body">Purpose: priority scoring, review signals, and recommended checks.</text>
  <text x="525" y="1291" class="small">This is where alert-review policy lives.</text>

  <rect class="subbox-skills" x="500" y="1380" width="700" height="345" rx="16"/>
  <text x="525" y="1416" class="label">narrative_generation/</text>
  <text x="525" y="1442" class="mono">SKILL.md</text>
  <text x="525" y="1465" class="mono">narrative_policy.yaml / narrative_policy.schema.json</text>
  <text x="525" y="1488" class="mono">narrative_policy_contract.md</text>
  <text x="525" y="1511" class="mono">narrative_template.md</text>
  <text x="525" y="1534" class="mono">prohibited_claims.yaml / prohibited_claims.schema.json</text>
  <text x="525" y="1557" class="mono">prohibited_claims_contract.md</text>
  <text x="525" y="1589" class="body">Purpose: define narrative shape, wording, and safety boundaries.</text>
  <text x="525" y="1613" class="small">This is where cautious language and prohibited claims are managed.</text>

  <!-- Harness column -->
  <rect class="harness" x="1260" y="240" width="900" height="1520" rx="20"/>
  <text x="1290" y="286" class="section">Harness</text>
  <text x="1290" y="318" class="path">src/afc_network_narrative/harness/</text>
  <text x="1290" y="346" class="small">Engineering-owned execution, validation, computation, orchestration, and output rendering.</text>

  <rect class="subbox-harness" x="1290" y="380" width="840" height="170" rx="16"/>
  <text x="1315" y="416" class="label">app/</text>
  <text x="1315" y="442" class="mono">main.py</text>
  <text x="1505" y="442" class="body">FastAPI endpoints: analyze-image, analyze-graph-json, PDF routes</text>
  <text x="1315" y="467" class="mono">pipeline.py</text>
  <text x="1505" y="467" class="body">analyze_graph(), analyze_image_file()</text>
  <text x="1315" y="492" class="mono">skill_loader.py</text>
  <text x="1505" y="492" class="body">load_*(), validate_*_contract(), validate_*_semantics()</text>

  <rect class="subbox-harness" x="1290" y="575" width="840" height="170" rx="16"/>
  <text x="1315" y="611" class="label">schemas/</text>
  <text x="1315" y="637" class="mono">graph_extraction_schema.py</text>
  <text x="1600" y="637" class="body">GraphValidationError, Node, Edge, GraphExtraction</text>
  <text x="1315" y="662" class="mono">afc_output_schema.py</text>
  <text x="1600" y="662" class="body">AFCNarrativeOutput</text>
  <text x="1315" y="687" class="small">Stable contracts between extraction, skills, and final output.</text>

  <rect class="subbox-harness" x="1290" y="770" width="840" height="205" rx="16"/>
  <text x="1315" y="806" class="label">features/</text>
  <text x="1315" y="832" class="mono">amount_parser.py</text>
  <text x="1600" y="832" class="body">parse_amount(), parse_amount_with_currency()</text>
  <text x="1315" y="857" class="mono">graph_features.py</text>
  <text x="1600" y="857" class="body">NodeFeature, GraphFeatures, build_graph_features()</text>
  <text x="1315" y="882" class="mono">motif_detector.py</text>
  <text x="1600" y="882" class="body">MotifResult, detect_motifs(), find_cycles(), motif_thresholds()</text>
  <text x="1315" y="917" class="small">Turns validated graph JSON into deterministic feature and motif state.</text>

  <rect class="subbox-harness" x="1290" y="1000" width="840" height="205" rx="16"/>
  <text x="1315" y="1036" class="label">rules/</text>
  <text x="1315" y="1062" class="mono">rule_engine.py</text>
  <text x="1600" y="1062" class="body">TypologyMatch, RuleEngine, graph_conditions_met()</text>
  <text x="1315" y="1087" class="mono">scoring.py</text>
  <text x="1600" y="1087" class="body">score_alert(), build_sar_red_flags(), build_scenario_coverage()</text>
  <text x="1315" y="1122" class="small">Connects computed graph state to typology rules and alert-review policy.</text>

  <rect class="subbox-harness" x="1290" y="1230" width="840" height="205" rx="16"/>
  <text x="1315" y="1266" class="label">narrative/</text>
  <text x="1315" y="1292" class="mono">grounding.py</text>
  <text x="1600" y="1292" class="body">build_evidence(), assert_no_prohibited_claims()</text>
  <text x="1315" y="1317" class="mono">narrative_builder.py</text>
  <text x="1600" y="1317" class="body">build_narrative_output(), compose_narrative()</text>
  <text x="1315" y="1352" class="small">Assembles the final human-readable explanation from facts, rules, score, and playbooks.</text>

  <rect class="subbox-harness" x="1290" y="1460" width="840" height="130" rx="16"/>
  <text x="1315" y="1496" class="label">reporting/</text>
  <text x="1315" y="1522" class="mono">pdf_report.py</text>
  <text x="1600" y="1522" class="body">ReportLine, write_report_pdf(), build_report_pdf_bytes()</text>
  <text x="1315" y="1552" class="small">Renders a PDF from the structured analysis output.</text>

  <rect class="subbox-harness" x="1290" y="1615" width="840" height="110" rx="16"/>
  <text x="1315" y="1651" class="label">evaluation/</text>
  <text x="1315" y="1677" class="mono">golden_set_runner.py / metrics.py</text>
  <text x="1600" y="1677" class="body">offline evaluation, precision/recall/grounding metrics</text>

  <line class="line" x1="440" y1="380" x2="470" y2="380"/>
  <line class="line" x1="1230" y1="380" x2="1260" y2="380"/>

  <rect class="panel-soft" x="80" y="1650" width="360" height="78" rx="16"/>
  <text x="110" y="1695" class="note">Model boundary: image input -&gt; VLM Adapter -&gt; GraphExtraction</text>

  <rect class="panel-soft" x="80" y="1738" width="2080" height="42" rx="12"/>
  <text x="110" y="1766" class="note">Execution path: GraphExtraction -&gt; validation -&gt; features -&gt; rules -&gt; scoring -&gt; narrative -&gt; JSON/PDF</text>
</svg>
