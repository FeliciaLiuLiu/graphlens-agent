section_templates:
  alert_candidate: "This graph is a {priority_band} alert-review candidate with score {score}. {explanation} The score means the graph may warrant analyst review; it is not a suspicious activity conclusion and is not a SAR/STR filing decision."
  network_observation: "The validated graph contains {node_count} nodes and {edge_count} directed edges. Detected motifs include fan-in nodes {fan_in_nodes}, fan-out nodes {fan_out_nodes}, and pass-through relay candidates {pass_through_nodes}. Key extracted entities include {key_entities}."
  typology_hypothesis: "AFC pattern meaning: in AFC terms, {typology_name} means: {afc_interpretation} In this graph, the pattern is supported by {evidence}. Confidence is {confidence}. {caution}"
  no_match_hypothesis: "No configured AFC typology matched the graph structure. This means the current skills did not find a supported AFC pattern from the extracted graph alone."
  alert_boost: "{priority_band} priority, score {score}. {explanation} The review rationale is based on graph structure and configured AFC skills, not on a finding of wrongdoing. SAR/STR review note: {sar_review}"
  sar_red_flag_match: "{name}: {matched_text} Review question: {review_question} {caution}"
  sar_red_flag_no_match: "No graph-supported SAR/STR red flag review signals matched. Context-only red flags may still require analyst review if additional non-graph facts are available."
  key_evidence_match: "{typology_name}: {evidence}"
  key_evidence_fallback: "Validated money-flow evidence is limited to extracted edges and labels because no typology rule matched."
  evidence_item: "{metric}={value}{node_suffix}"
  evidence_item_with_amount: "{metric}={value} at amount {amount_value}{node_suffix}"
rendering:
  none_text: "none"
  list_joiner: "; "
  section_joiner: " "
static_limitations:
  - "This output is an investigative aid and does not make a final suspicious activity conclusion."
  - "This output does not make a SAR filing decision."
evaluation_terms:
  missing_context_required_terms:
    - timestamp
    - kyc
    - geographic
    - channel
    - baseline
report_pdf:
  title: "AFC Network Narrative Report"
  subtitle_template: "Case ID: {case_id}"
  input_reference_template: "Input reference: {input_name}"
  section_titles:
    narrative: "Human-Readable Narrative"
    graph_summary: "Graph Summary"
    detected_typologies: "Detected Typologies"
    alert_boost: "Alert Investigation Boost"
    sar_red_flags: "SAR Red Flag Review Signals"
    recommended_steps: "Recommended Investigation Steps"
    limitations: "Limitations and Missing Context"
    evidence: "Key Evidence"
  summary_item_templates:
    node_count: "Node count: {value}"
    edge_count: "Edge count: {value}"
    repeated_amount_score: "Repeated amount score: {value}"
    repeated_amount_value: "Repeated amount value: {value}"
    overall_extraction_confidence: "Overall extraction confidence: {value}"
  typology_line_template: "{name} (confidence {confidence}): {interpretation}"
  alert_boost_template: "{priority_band} priority, score {score}. {explanation}"
  sar_red_flag_line_template: "{name}: {matched_text} Review question: {review_question}"
  evidence_line_template: "{label}: {details}"
  max_evidence_items: 8
